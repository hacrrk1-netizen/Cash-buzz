<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Balance - Admin</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; min-height: 100vh; }
        .header { background: #1e3a8a; padding: 20px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 3px solid #1e40af; }
        .container { padding: 30px 15px; max-width: 400px; margin: auto; width: 100%; box-sizing: border-box; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #60a5fa; text-decoration: none; font-weight: bold; }
        .form-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); color: #333; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #1e3a8a; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .update-btn { width: 100%; background: #1e3a8a; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #msg { margin-top: 15px; text-align: center; font-weight: bold; display: none; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
<div class="header">BALANCE UPDATE 💰</div>
<div class="container">
    <a href="admin.html" class="back-btn">← Back to Database</a>
    <div class="form-card">
        <div class="form-group">
            <label>User UID</label>
            <input type="text" id="uid" placeholder="Example: 51629">
        </div>
        <div class="form-group">
            <label>New Balance (₹)</label>
            <input type="number" id="amount" placeholder="Enter Amount">
        </div>
        <button class="update-btn" id="upBtn">Update Now</button>
        <div id="msg"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, update, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAFeBWLykjlE25vzKFRRJjAw6f1gylplLI",
        authDomain: "admin222-a87bb.firebaseapp.com",
        projectId: "admin222-a87bb",
        databaseURL: "https://admin222-a87bb-default-rtdb.firebaseio.com",
        appId: "1:125393999260:web:be03947a943f50cb0be459"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    async function updateBalance() {
        const inputUid = document.getElementById('uid').value.trim();
        const amount = parseFloat(document.getElementById('amount').value);
        const btn = document.getElementById('upBtn');

        if (!inputUid || isNaN(amount)) {
            showMsg("Details sahi se bharo!", "red");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Updating Lobby...";

        try {
            const usersRef = ref(db, 'users');
            
            // UID search logic (Number format)
            let uidQuery = query(usersRef, orderByChild('uid'), equalTo(parseInt(inputUid)));
            let snapshot = await get(uidQuery);

            // UID search logic (String format backup)
            if (!snapshot.exists()) {
                uidQuery = query(usersRef, orderByChild('uid'), equalTo(inputUid));
                snapshot = await get(uidQuery);
            }

            if (snapshot.exists()) {
                const userData = snapshot.val();
                const phoneKey = Object.keys(userData)[0]; 

                // Direct Update in Firebase 
                // lobby.html automatically isko detect karke real-time update kar degi
                await update(ref(db, 'users/' + phoneKey), {
                    balance: amount
                });

                showMsg(`Success! ₹${amount} Sent to Lobby for UID ${inputUid}`, "green");
                document.getElementById('amount').value = "";
            } else {
                showMsg("Error: UID nahi mili!", "red");
            }
        } catch (e) {
            console.error(e);
            showMsg("Error: Database connection fail!", "red");
        } finally {
            btn.disabled = false;
            btn.innerText = "Update Now";
        }
    }

    function showMsg(text, color) {
        const msg = document.getElementById('msg');
        msg.style.display = "block";
        msg.style.color = color === "green" ? "#15803d" : "#b91c1c";
        msg.style.backgroundColor = color === "green" ? "#dcfce7" : "#fee2e2";
        msg.innerHTML = text;
    }

    document.getElementById('upBtn').addEventListener('click', updateBalance);
</script>
</body>
</html>
