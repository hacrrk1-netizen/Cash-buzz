<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cash buzz</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #ffffff; color: #333; }
        .header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eeeeee; background: #fff; position: sticky; top: 0; z-index: 100; }
        .back-btn { font-size: 24px; text-decoration: none; color: #333; margin-right: 15px; cursor: pointer; }
        .header-title { font-size: 18px; font-weight: bold; }
        .profile-container { padding: 20px; }
        .info-box { margin-bottom: 25px; }
        .label { font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 17px; font-weight: 600; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; color: #1e293b; }
        .uid-highlight { color: #1e3a8a; font-family: monospace; font-size: 20px; }
        .balance-value { color: #10b981; font-size: 22px; }
        #error-msg { color: white; background: #ef4444; padding: 10px; font-size: 14px; text-align: center; display: none; }
    </style>
</head>
<body>
    <div id="error-msg">Connection Error! Login again.</div>
    <div class="header">
        <a href="lobby.html" class="back-btn">⬅</a>
        <div class="header-title">My Profile</div>
    </div>

    <div class="profile-container">
        <div class="info-box">
            <div class="label">Available Balance</div>
            <div class="value balance-value">₹<span id="user-balance">0.00</span></div>
        </div>
        <div class="info-box">
            <div class="label">Permanent User ID (UID)</div>
            <div class="value uid-highlight" id="user-uid">Loading...</div>
        </div>
        <div class="info-box">
            <div class="label">Full Name</div>
            <div class="value" id="user-name">Loading...</div>
        </div>
        <div class="info-box">
            <div class="label">Phone Number</div>
            <div class="value" id="user-phone">Loading...</div>
        </div>
        <div class="info-box">
            <div class="label">Email Address</div>
            <div class="value" id="user-email">Loading...</div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAFeBWLykjlE25vzKFRRJjAw6f1gylplLI",
        authDomain: "admin222-a87bb.firebaseapp.com",
        projectId: "admin222-a87bb",
        databaseURL: "https://admin222-a87bb-default-rtdb.firebaseio.com",
        appId: "1:125393999260:web:be03947a943f50cb0be459"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function loadProfile() {
        // Login ke time jo number save hua tha
        let loggedPhone = localStorage.getItem("user_phone");

        if (!loggedPhone) {
            document.getElementById("error-msg").style.display = "block";
            document.getElementById("error-msg").innerText = "No Session Found! Login again.";
            return;
        }

        // Firebase path: users/phone_number
        const userRef = ref(db, 'users/' + loggedPhone);

        // Real-time listener laga diya taaki b.html se balance update hote hi yahan dikh jaye
        onValue(userRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                
                // UI update kar rahe hain
                document.getElementById("user-uid").innerText = data.uid || "N/A";
                document.getElementById("user-name").innerText = data.name || "N/A";
                document.getElementById("user-phone").innerText = "+" + (data.number || loggedPhone);
                document.getElementById("user-email").innerText = data.email || "Not Provided";
                
                // Balance update
                const currentBalance = parseFloat(data.balance || 0).toFixed(2);
                document.getElementById("user-balance").innerText = currentBalance;
                
                // localStorage update taaki lobby mein bhi dikhe
                localStorage.setItem("user_balance", currentBalance);
                localStorage.setItem("user_uid", data.uid);
            } else {
                document.getElementById("error-msg").style.display = "block";
                document.getElementById("error-msg").innerText = "User not found in Database.";
            }
        }, (error) => {
            console.error(error);
            document.getElementById("error-msg").style.display = "block";
        });
    }

    window.onload = loadProfile;
</script>
</body>
</html>
